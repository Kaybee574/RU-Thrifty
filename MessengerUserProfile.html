<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RU Thrifty - User Profile</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      /* User Profile Page styling  */
      body {
        background-color: var(--purple-bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--dark);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      main {
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--secondary);
        padding: 30px;
        max-width: 600px;
        width: 100%;
      }

      .user-profile {
        text-align: center;
        margin-bottom: 20px;
      }

      .user-profile img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--primary);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .user-profile figcaption {
        margin-top: 10px;
        font-style: italic;
        color: var(--text-muted);
      }

      .user-details dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 15px 20px;
        margin: 0;
      }

      .user-details dt {
        font-weight: 600;
        color: var(--primary);
        font-size: 1.1rem;
      }

      .user-details dd {
        margin: 0;
        color: var(--dark);
        font-size: 1rem;
      }

      .user-details time {
        color: var(--text-muted);
      }

      /* Back button */
      .back-link {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: var(--primary);
        color: var(--white);
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: background-color 0.2s;
      }

      .back-link:hover {
        background-color: var(--accent);
      }

      /* Responsive design for user profile page */
      @media (max-width: 600px) {
        main {
          padding: 20px;
        }
        .user-profile img {
          width: 120px;
          height: 120px;
        }
        .user-details dl {
          grid-template-columns: 1fr;
          gap: 10px;
        }
        .user-details dt {
          margin-bottom: 2px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <!-- User Profile Picture -->
      <figure class="user-profile">
        <img
          src="default_user_avatars/default_user_avatar.jpg"
          alt="Profile picture of the user"
        />
        <figcaption>User Avatar</figcaption>
      </figure>

      <!-- User Profile Information -->
      <section class="user-details">
        <dl>
          <dt>User Name</dt>
          <dd>Bucie Magagula</dd>

          <dt>Student Number</dt>
          <dd>g24m4590</dd>

          <dt>Residence</dt>
          <dd>Helen Joseph</dd>

          <dt>Joined In</dt>
          <dd>
            <time datetime="2024-01-15">January 15, 2024</time>
          </dd>
        </dl>
      </section>

      <!-- Link back to chat -->
      <a href="MessengerChat.html" class="back-link">Back to Chat</a>
    </main>

    <!-- Link to main Javascript File -->
    <script src="index.js" defer></script>
  </body>
</html>
