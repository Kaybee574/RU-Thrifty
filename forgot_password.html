<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RU Thrifty - Forgot Password</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    /* Forgot Password Page Styling */
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--purple-bg);
      background-image: url("sign2.jpeg");
      background-size: cover;
      background-blend-mode: overlay;
      font-size: x-large;
      display: grid;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      color: var(--dark);
    }

    /* Main container styling*/
    .mainSection {
      display: grid;
      justify-content: center;
      background-color: var(--white);
      max-width: 800px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--secondary);
      padding: 30px;
      font-size: 1rem;
    }

    .signup-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
      background-color: transparent;
      border-radius: 8px;
      display: grid;
      gap: 30px;
    }

    h1 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 1rem;
      font-family: Cambria, Cochin, Georgia, Times, serif;
      font-size: 2.5rem;
    }

    label {
      color: var(--dark);
      font-weight: 500;
    }

    input {
      width: 100%;
      max-width: 400px;
      padding: 1rem;
      font-size: 1.1rem;
      box-sizing: border-box;
      border: 1px solid var(--secondary);
      border-radius: 8px;
      font-family: inherit;
    }

    input:focus {
      outline: 2px solid var(--primary);
      border-color: transparent;
    }

    /* Button styling */
    .myButton {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px 30px;
    }

    button.myButton {
      font-size: clamp(1rem, 2vw, 1.5rem);
      border: 2px solid var(--primary);
      border-radius: 8px;
      color: var(--white);
      background-color: var(--primary);
      padding: 12px 24px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      min-width: 200px;
      transition:
        background-color 0.2s,
        border-color 0.2s;
    }

    button.myButton:hover {
      background-color: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }

    .myButton a:hover {
      background: transparent;
    }

    /* Links styling*/
    p {
      color: var(--text-muted);
      text-align: center;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Form row with error styling */
    .formrow {
      margin-bottom: 1rem;
      position: relative;
    }
    .formrow small {
      color: red;
      display: none;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    .formrow.error input {
      border-color: red;
    }
    .formrow.error small {
      display: block;
    }
    .formrow.success input {
      border-color: green;
    }

    /* Responsive design for forgot password page */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .mainSection {
        padding: 20px;
      }
      h1 {
        font-size: 2rem;
      }
    }
  </style>

  <body>
    <!--forgot password form -->
    <header>
      <h1>Forgot Password</h1>
    </header>

    <section class="mainSection">
      <form action="" method="post" class="signup-container" id="forgotForm">
        <div class="formrow">
          <label for="email">Please enter your email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="studentnumber@campus.ru.ac.za"
          />
          <small>Enter your email address</small>
        </div>
        <button type="submit" class="myButton">Reset Password</button>
      </form>
      <!-- sign in links -->
      <p>Don't have an account? <a href="SignUp.html">Sign Up</a></p>
      <p>Already have an account? <a href="SignIn.html">Sign In</a></p>
    </section>
    <!-- Link to main Javascript File -->
    <script src="index.js" defer></script>
  </body>
</html>
