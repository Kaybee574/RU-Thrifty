<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RU Thrifty - Chats</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Messenger Chat styling */
      body {
        background-color: var(--purple-bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--dark);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Header with back button, avatar, and contact name */
      header {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 10px 20px;
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--secondary);
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .back-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background-color: var(--primary);
        color: var(--white);
        border-radius: 50%;
        text-decoration: none;
        font-size: 1.5rem;
        font-weight: bold;
        transition: background-color 0.2s;
      }

      .back-link:hover {
        background-color: var(--accent);
      }

      .header-avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--primary);
        cursor: pointer;
      }

      .header-avatar:hover {
        opacity: 0.9;
      }

      h2 {
        color: var(--dark);
        font-size: 1.5rem;
        margin: 0;
        flex: 1;
      }

      /* Chat messages area  styling*/
      main {
        flex: 1;
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--secondary);
        padding: 20px;
        overflow-y: auto;
        margin-bottom: 20px;
      }

      /* Message bubbles styling */
      article {
        max-width: 70%;
        margin-bottom: 15px;
        padding: 12px 18px;
        border-radius: 20px;
        position: relative;
        clear: both;
      }

      /* Message from contact styling */
      section > article:first-of-type,
      section > article:nth-of-type(odd) {
        background-color: var(--secondary);
        color: var(--dark);
        float: left;
        border-bottom-left-radius: 4px;
      }

      /* Message from user styling */
      section > article:nth-of-type(even) {
        background-color: var(--primary);
        color: var(--white);
        float: right;
        border-bottom-right-radius: 4px;
      }

      section::after {
        content: "";
        display: table;
        clear: both;
      }

      /* Footer input area styling*/
      footer {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--secondary);
        flex-wrap: wrap;
      }

      label {
        font-weight: 600;
        color: var(--dark);
      }

      #message-input {
        flex: 1;
        padding: 12px 20px;
        font-size: 1rem;
        border: 2px solid var(--secondary);
        border-radius: 50px;
        outline: none;
        background: var(--white);
        color: var(--dark);
        min-width: 200px;
      }

      #message-input:focus {
        border-color: var(--primary);
      }

      button {
        padding: 12px 30px;
        background-color: var(--primary);
        color: var(--white);
        border: none;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: var(--accent);
      }

      /* Responsive design for messenger chat page */
      @media (max-width: 600px) {
        header {
          justify-content: center;
          text-align: center;
        }
        h2 {
          text-align: center;
        }
        article {
          max-width: 85%;
        }
        footer {
          flex-direction: column;
          align-items: stretch;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <!-- Back button to conversations list -->
      <a
        href="MessengerHome.html"
        class="back-link"
        aria-label="Back to conversations"
        >←</a
      >

      <!-- Avatar linking to user profile -->
      <a href="MessengerUserProfile.html">
        <img
          src="default_user_avatars/default_user_avatar.png"
          alt="Profile picture of User"
          class="header-avatar"
        />
      </a>

      <!-- Contact Name -->
      <h2>Jabulani Sikhakhane</h2>
    </header>

    <main>
      <section>
        <article>
          <!-- The message from the contact -->
          <p>Hi, I'm Jabulani, I am interested in buying your product.</p>
        </article>
        <!-- Message from User -->
        <article>
          <p>Hello Jabulani, may I ask which product?</p>
        </article>

        <article>
          <!-- The message from the contact -->
          <p>I am interested in buying your Casio calculator.</p>
        </article>

        <!-- Message from User -->
        <article>
          <p>Ok, I still have the Casio calculator.</p>
        </article>
      </section>
    </main>

    <footer>
      <label for="message-input">Type a message</label>
      <input
        type="text"
        id="message-input"
        name="message-input"
        placeholder="Type in message"
      />

      <button type="button">Send</button>
    </footer>
    <!-- Link to main Javascript File -->
    <script src="index.js" defer></script>
  </body>
</html>
