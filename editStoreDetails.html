<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Store Details - RU Thrifty</title>
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Edit Store Details Page Styles  */
      body {
        background-color: var(--purple-bg);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--dark);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .signup-container {
        max-width: 600px;
        width: 100%;
        margin: 2rem auto;
        padding: 2rem;
        background-color: var(--white);
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--secondary);
      }

      h1 {
        color: var(--primary);
        text-align: center;
        margin-bottom: 2rem;
        font-family: Cambria, Cochin, Georgia, Times, serif;
        font-size: 2.5rem;
      }

      form {
        display: grid;
        gap: 15px;
      }

      .formrow {
        margin-bottom: 1rem;
        position: relative;
      }

      .formrow label {
        display: block;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 5px;
      }

      .formrow input {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        border: 2px solid var(--secondary);
        border-radius: 8px;
        font-family: inherit;
        transition: border-color 0.2s;
      }

      .formrow input:focus {
        outline: none;
        border-color: var(--primary);
      }

      .formrow small {
        color: red;
        display: none;
        font-size: 0.8rem;
        margin-top: 4px;
      }

      .formrow.error input {
        border-color: red;
      }

      .formrow.error small {
        display: block;
      }

      .formrow.success input {
        border-color: green;
      }

      .buttonSection {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .buttonSection button {
        padding: 12px 30px;
        font-size: 1.1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s;
        min-width: 150px;
      }

      #ConfirmButton {
        background-color: var(--primary);
        color: var(--white);
      }

      #ConfirmButton:hover {
        background-color: var(--accent);
      }

      #CancelButton {
        background-color: var(--secondary);
        color: var(--dark);
      }

      #CancelButton:hover {
        background-color: #d4b5e6;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .signup-container {
          padding: 1.5rem;
          margin: 1rem;
        }
        h1 {
          font-size: 2rem;
        }
        .buttonSection {
          flex-direction: column;
          align-items: stretch;
        }
        .buttonSection button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <header>
        <h1>Modify your details</h1>
      </header>
      <!-- Form to edit store details -->
      <form action="" method="post" class="edit-details-form">
        <div class="formrow">
          <label for="storeName">Store Name:</label>
          <input
            type="text"
            id="storeName"
            name="storeName"
            placeholder="Enter your Store Name"
            required
          />
          <small>Error message</small>
        </div>

        <div class="formrow">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="username@campus.ru.ac.za"
            required
          />
          <small>Error message</small>
        </div>

        <div class="formrow">
          <label for="phoneNumber">Phone Number</label>
          <input
            type="text"
            id="phoneNumber"
            name="phoneNumber"
            placeholder="Enter your phone Number"
            required
          />
          <small>Error message</small>
        </div>

        <div class="formrow">
          <label for="location">Location</label>
          <input
            type="text"
            id="location"
            name="location"
            required
            placeholder="Enter your location"
          />
          <small>Error message</small>
        </div>

        <div class="formrow">
          <label for="comments">Additional Comments</label>
          <input
            type="text"
            id="comments"
            name="comments"
            placeholder="Write some more information about your store"
            required
          />
          <small>Error message</small>
        </div>

        <div class="buttonSection">
          <button type="submit" id="ConfirmButton">Confirm</button>
          <button type="button" id="CancelButton">Cancel</button>
        </div>
      </form>
    </div>

    <script>
      // Cancel button redirects to seller dashboard
      document
        .getElementById("CancelButton")
        .addEventListener("click", function () {
          window.location.href = "sellerDashboard.html";
        });

      // Simple client-side validation and redirect on success
      document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault();
        // Basic validation (check if any field is empty)
        const inputs = document.querySelectorAll("input[required]");
        let isValid = true;
        inputs.forEach((input) => {
          if (input.value.trim() === "") {
            input.parentElement.classList.add("error");
            const small = input.parentElement.querySelector("small");
            small.textContent = "This field is required";
            isValid = false;
          } else {
            input.parentElement.classList.remove("error");
            input.parentElement.classList.add("success");
          }
        });
        if (isValid) {
          alert("Changes saved!");
          window.location.href = "sellerDashboard.html";
        }
      });
    </script>
    <script defer src="index.js"></script>
  </body>
</html>
